- name: Veradigm Unity API
  description: The Veradigm Unity API exposes clinical, scheduling, demographic, and
    practice management functions across Allscripts EHR product lines including Touchworks,
    Professional EHR, and acute care solutions. It supports both SOAP and REST endpoints
    with an action-based dispatch model. The Unity API is available to certified Integrator
    members and provides read-write access to cloud-hosted Allscripts solutions for
    building custom healthcare integrations.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
