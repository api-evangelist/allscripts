name: Allscripts
description: Allscripts, now operating as Veradigm, is a healthcare IT company providing
  REST and FHIR APIs for EHR data exchange, clinical workflows, patient portal, and
  practice management integrations. The Veradigm Developer Program (formerly Allscripts
  Developer Program) offers FHIR R4 APIs covering 28 clinical resources as well as
  a Unity API for clinical, scheduling, demographic, and practice management functions
  across Allscripts EHR products.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/allscripts/refs/heads/main/apis.yml
