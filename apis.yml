- name: Veradigm Paragon Open API
  description: The Paragon Open API provides FHIR-compliant access to data from the
    Veradigm Paragon acute care EHR platform. It enables third-party applications
    to integrate with Paragon to access patient clinical data, supporting interoperability
    requirements for hospital and acute care settings.
