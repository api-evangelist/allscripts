apis:
- name: Veradigm FHIR R4 API
  description: The Veradigm FHIR R4 API provides RESTful access to clinical, demographic,
    and facility data using the HL7 FHIR R4 standard. It supports 28 FHIR resources
    including Patient, Condition, Observation, MedicationRequest, Encounter, and more.
    Authentication uses OAuth 2.0 with SMART on FHIR Application Launch Framework
    2.0. Endpoints are available for both patient-facing (ending in /open) and provider-facing
    (ending in /fhir) applications.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.veradigm.com/Fhir/Introduction
  baseURL: https://open.platform.veradigm.com
